name: Test

on:
  pull_request:
    branches: [main, dev]

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: Moloko99
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P Moloko99 -C -Q 'SELECT 1' || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      UMBRACO_CLIENT_ID: umbraco-back-office-mcp
      UMBRACO_CLIENT_SECRET: '1234567890'
      UMBRACO_BASE_URL: https://localhost:44391
      NODE_TLS_REJECT_UNAUTHORIZED: '0'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-

      - name: Install npm dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run compile

      - name: Build
        run: npm run build

      - name: Setup .NET dev certs
        run: dotnet dev-certs https

      - name: Configure Umbraco for CI
        run: |
          cat > demo-site-template/appsettings.Local.json << 'EOF'
          {
            "ConnectionStrings": {
              "umbracoDbDSN": "Server=localhost,1433;Database=umbraco-mcp-ci;User Id=sa;password=Moloko99;TrustServerCertificate=True",
              "umbracoDbDSN_ProviderName": "Microsoft.Data.SqlClient"
            }
          }
          EOF

      - name: Start Umbraco
        run: |
          cd demo-site-template
          ASPNETCORE_ENVIRONMENT=Development \
          ASPNETCORE_URLS="http://localhost:56472;https://localhost:44391" \
          dotnet run --no-launch-profile > /tmp/umbraco.log 2>&1 &
          echo $! > /tmp/umbraco.pid

      - name: Wait for Umbraco
        run: |
          echo "Waiting for Umbraco to be ready..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:56472/umbraco/management/api/v1/server/status > /dev/null 2>&1; then
              echo "Umbraco is ready!"
              exit 0
            fi
            # Check if process died
            if ! kill -0 $(cat /tmp/umbraco.pid) 2>/dev/null; then
              echo "Umbraco process died! Last 50 lines of log:"
              tail -50 /tmp/umbraco.log
              exit 1
            fi
            echo "Attempt $i/60 - waiting 5s..."
            sleep 5
          done
          echo "Umbraco failed to start within 5 minutes. Last 50 lines of log:"
          tail -50 /tmp/umbraco.log
          exit 1
        timeout-minutes: 6

      - name: Create API user
        run: node scripts/create-api-user.mjs http://localhost:56472 admin@admin.com 1234567890

      - name: Run tests
        id: unit-integration
        run: npm test -- --no-coverage

      - name: Test failure report
        if: failure() && steps.unit-integration.outcome == 'failure'
        run: |
          echo "## Test Failures" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat test-failures.log >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "No failure log found"
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright E2E tests
        run: npm run test:e2e

